<nav class="bg-white border-b border-borderColor py-3 px-4 lg:px-8 fixed w-full z-50 top-0">
  <div class="max-w-6xl mx-auto flex justify-between items-center">

    <!-- Logo + Store Name (acts as Home link) -->
    <a routerLink="/" class="flex items-center gap-2">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
        <i class="bi bi-fire text-white text-sm"></i>
      </div>
      <div class="flex flex-col">
        <span class="font-heading text-lg font-bold text-textDark leading-tight">
          {{ storeName || 'FastFood' }}
        </span>
        <span *ngIf="storeName" class="text-[10px] text-textMuted leading-tight">Powered by FastFood</span>
      </div>
    </a>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex items-center gap-1">
      <!-- Customer links (USER role or not logged in) -->
      <ng-container *ngIf="!isLoggedIn || userRole === 'ROLE_USER'">
        <li>
          <a routerLink="/cart" routerLinkActive="text-primary bg-primary-50"
             class="px-3 py-2 rounded-lg text-sm font-medium text-textLight hover:text-primary hover:bg-primary-50 transition-colors">
            Cart
          </a>
        </li>
        <li *ngIf="isLoggedIn">
          <a routerLink="/orders" routerLinkActive="text-primary bg-primary-50"
             class="px-3 py-2 rounded-lg text-sm font-medium text-textLight hover:text-primary hover:bg-primary-50 transition-colors">
            Orders
          </a>
        </li>
      </ng-container>

      <!-- Sign In / Logout -->
      <li class="ml-2" *ngIf="!isLoggedIn">
        <a routerLink="/login"
           class="px-4 py-2 rounded-lg text-sm font-semibold bg-primary text-white hover:bg-primary-600 transition-colors">
          Sign In
        </a>
      </li>
      <li class="ml-2" *ngIf="isLoggedIn">
        <button (click)="logout()"
                class="px-4 py-2 rounded-lg text-sm font-medium text-textLight hover:text-danger hover:bg-red-50 transition-colors">
          Logout
        </button>
      </li>
    </ul>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMenu()" class="md:hidden w-9 h-9 rounded-lg hover:bg-gray-100 flex items-center justify-center transition-colors">
      <i [class]="menuOpen ? 'bi bi-x-lg text-textDark' : 'bi bi-list text-textDark text-xl'"></i>
    </button>
  </div>

  <!-- Mobile Drawer -->
  <div [class.translate-x-0]="menuOpen" [class.-translate-x-full]="!menuOpen"
       class="fixed top-0 left-0 h-full w-72 bg-white shadow-float transform transition-transform duration-300 z-40 md:hidden">

    <!-- Drawer Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-borderColor">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
          <i class="bi bi-fire text-white text-sm"></i>
        </div>
        <span class="font-heading font-bold text-textDark">{{ storeName || 'FastFood' }}</span>
      </div>
      <button (click)="toggleMenu()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center">
        <i class="bi bi-x-lg text-textDark text-sm"></i>
      </button>
    </div>

    <!-- Drawer Links -->
    <nav class="py-2">
      <!-- Customer links only -->
      <ng-container *ngIf="!isLoggedIn || userRole === 'ROLE_USER'">
        <a routerLink="/cart" (click)="toggleMenu()" class="flex items-center gap-3 px-5 py-3 text-sm text-textDark hover:bg-primary-50 hover:text-primary transition-colors">
          <i class="bi bi-cart3 text-base"></i> Cart
        </a>
        <a *ngIf="isLoggedIn" routerLink="/orders" (click)="toggleMenu()" class="flex items-center gap-3 px-5 py-3 text-sm text-textDark hover:bg-primary-50 hover:text-primary transition-colors">
          <i class="bi bi-receipt text-base"></i> Orders
        </a>
      </ng-container>

      <div class="border-t border-borderColor my-2"></div>

      <a *ngIf="!isLoggedIn" routerLink="/login" (click)="toggleMenu()"
         class="flex items-center gap-3 px-5 py-3 text-sm font-semibold text-primary hover:bg-primary-50 transition-colors">
        <i class="bi bi-box-arrow-in-right text-base"></i> Sign In
      </a>
      <button *ngIf="isLoggedIn" (click)="logout()"
              class="w-full flex items-center gap-3 px-5 py-3 text-sm text-danger hover:bg-red-50 transition-colors text-left">
        <i class="bi bi-box-arrow-left text-base"></i> Logout
      </button>
    </nav>
  </div>

  <!-- Overlay -->
  <div *ngIf="menuOpen" (click)="toggleMenu()" class="fixed inset-0 bg-black/40 z-30 md:hidden"></div>
</nav>
