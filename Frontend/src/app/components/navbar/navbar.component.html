<nav [class]="hasStoreContext
       ? 'navbar-branded py-3 px-4 lg:px-8 fixed w-full z-50 top-0'
       : 'bg-white border-b border-borderColor py-3 px-4 lg:px-8 fixed w-full z-50 top-0'"
     data-testid="navbar">
  <div class="max-w-7xl mx-auto flex justify-between items-center">

    <!-- Logo + Store Name -->
    <a (click)="goHome()" class="flex items-center gap-2 cursor-pointer">
      <img *ngIf="storeLogo" [src]="storeLogo"
           [class]="hasStoreContext ? 'w-8 h-8 rounded-lg object-cover ring-2 ring-white/30' : 'w-8 h-8 rounded-lg object-cover'" />
      <div *ngIf="!storeLogo"
           [class]="hasStoreContext ? 'w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center' : 'w-8 h-8 bg-primary rounded-lg flex items-center justify-center'">
        <i class="bi bi-fire text-white text-sm"></i>
      </div>
      <div class="flex flex-col">
        <span [class]="hasStoreContext
          ? 'font-heading text-lg font-bold text-white leading-tight'
          : 'font-heading text-lg font-bold text-textDark leading-tight'">
          {{ storeName || 'FastFood' }}
        </span>
        <span *ngIf="storeName && isAdmin"
              [class]="hasStoreContext ? 'text-[10px] text-white/70 leading-tight' : 'text-[10px] text-textMuted leading-tight'">Admin Panel</span>
        <span *ngIf="storeName && !isAdmin"
              [class]="hasStoreContext ? 'text-[10px] text-white/70 leading-tight' : 'text-[10px] text-textMuted leading-tight'">Powered by FastFood</span>
      </div>
    </a>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex items-center gap-1">
      <!-- Customer-only links -->
      <ng-container *ngIf="isCustomer">
        <li *ngIf="isLoggedIn">
          <a [routerLink]="cartRoute"
             [routerLinkActive]="hasStoreContext ? 'bg-white/20' : 'text-primary bg-primary-50'"
             [class]="hasStoreContext
               ? 'px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10 transition-colors'
               : 'px-3 py-2 rounded-lg text-sm font-medium text-textLight hover:text-primary hover:bg-primary-50 transition-colors'">
            <i class="bi bi-cart3 mr-1"></i> Cart
          </a>
        </li>
        <li *ngIf="isLoggedIn">
          <a [routerLink]="ordersRoute"
             [routerLinkActive]="hasStoreContext ? 'bg-white/20' : 'text-primary bg-primary-50'"
             [class]="hasStoreContext
               ? 'px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10 transition-colors'
               : 'px-3 py-2 rounded-lg text-sm font-medium text-textLight hover:text-primary hover:bg-primary-50 transition-colors'">
            <i class="bi bi-receipt mr-1"></i> Orders
          </a>
        </li>
      </ng-container>

      <!-- Auth button — only shown when browsing a store -->
      <li class="ml-2" *ngIf="!isLoggedIn && hasStoreContext">
        <a routerLink="/login" [queryParams]="{ returnUrl: router.url }" data-testid="nav-signin"
           class="px-4 py-2 rounded-lg text-sm font-semibold bg-white text-textDark hover:bg-white/90 transition-colors shadow-sm">
          Sign In
        </a>
      </li>
      <li class="ml-2" *ngIf="isLoggedIn">
        <button (click)="logout()" data-testid="nav-logout"
                [class]="hasStoreContext
                  ? 'px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10 transition-colors'
                  : 'px-4 py-2 rounded-lg text-sm font-medium text-textLight hover:text-danger hover:bg-red-50 transition-colors'">
          Logout
        </button>
      </li>
    </ul>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMenu()"
            [class]="hasStoreContext
              ? 'md:hidden w-9 h-9 rounded-lg hover:bg-white/10 flex items-center justify-center transition-colors'
              : 'md:hidden w-9 h-9 rounded-lg hover:bg-gray-100 flex items-center justify-center transition-colors'">
      <i [class]="menuOpen
        ? (hasStoreContext ? 'bi bi-x-lg text-white' : 'bi bi-x-lg text-textDark')
        : (hasStoreContext ? 'bi bi-list text-white text-xl' : 'bi bi-list text-textDark text-xl')"></i>
    </button>
  </div>

  <!-- Mobile Drawer -->
  <div [class.translate-x-0]="menuOpen" [class.-translate-x-full]="!menuOpen"
       class="fixed top-0 left-0 h-full w-72 bg-white shadow-float transform transition-transform duration-300 z-40 md:hidden">

    <!-- Drawer Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-borderColor">
      <div class="flex items-center gap-2">
        <img *ngIf="storeLogo" [src]="storeLogo" class="w-8 h-8 rounded-lg object-cover" />
        <div *ngIf="!storeLogo" class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
          <i class="bi bi-fire text-white text-sm"></i>
        </div>
        <span class="font-heading font-bold text-textDark">{{ storeName || 'FastFood' }}</span>
      </div>
      <button (click)="toggleMenu()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center">
        <i class="bi bi-x-lg text-textDark text-sm"></i>
      </button>
    </div>

    <!-- Drawer Links -->
    <nav class="py-2">
      <!-- Customer-only links -->
      <ng-container *ngIf="isCustomer">
        <a *ngIf="isLoggedIn" [routerLink]="cartRoute" (click)="toggleMenu()"
           class="flex items-center gap-3 px-5 py-3 text-sm text-textDark hover:bg-primary-50 hover:text-primary transition-colors">
          <i class="bi bi-cart3 text-base"></i> Cart
        </a>
        <a *ngIf="isLoggedIn" [routerLink]="ordersRoute" (click)="toggleMenu()"
           class="flex items-center gap-3 px-5 py-3 text-sm text-textDark hover:bg-primary-50 hover:text-primary transition-colors">
          <i class="bi bi-receipt text-base"></i> Orders
        </a>
        <a *ngIf="isLoggedIn" routerLink="/profile" (click)="toggleMenu()"
           class="flex items-center gap-3 px-5 py-3 text-sm text-textDark hover:bg-primary-50 hover:text-primary transition-colors">
          <i class="bi bi-person-circle text-base"></i> My Profile
        </a>
        <a *ngIf="isLoggedIn" routerLink="/profile/addresses" (click)="toggleMenu()"
           class="flex items-center gap-3 px-5 py-3 text-sm text-textDark hover:bg-primary-50 hover:text-primary transition-colors">
          <i class="bi bi-geo-alt text-base"></i> Saved Addresses
        </a>
      </ng-container>

      <div class="border-t border-borderColor my-2"></div>

      <a *ngIf="!isLoggedIn && hasStoreContext" routerLink="/login" [queryParams]="{ returnUrl: router.url }" (click)="toggleMenu()"
         class="flex items-center gap-3 px-5 py-3 text-sm font-semibold text-primary hover:bg-primary-50 transition-colors">
        <i class="bi bi-box-arrow-in-right text-base"></i> Sign In
      </a>
      <button *ngIf="isLoggedIn" (click)="logout()"
              class="w-full flex items-center gap-3 px-5 py-3 text-sm text-danger hover:bg-red-50 transition-colors text-left">
        <i class="bi bi-box-arrow-left text-base"></i> Logout
      </button>
    </nav>
  </div>

  <!-- Overlay -->
  <div *ngIf="menuOpen" (click)="toggleMenu()" class="fixed inset-0 bg-black/40 z-30 md:hidden"></div>
</nav>
