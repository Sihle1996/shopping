<footer class="fixed bottom-0 left-0 w-full z-40 bg-white border-t border-borderColor md:hidden">
  <div class="flex items-center justify-around px-2 py-2 max-w-lg mx-auto">

    <!-- Home -->
    <a [routerLink]="homeRoute"
       class="flex flex-col items-center gap-0.5 px-5 py-1.5 rounded-2xl transition-all duration-200 min-w-[60px]"
       [class.text-primary]="isActive(homeRoute)"
       [class.text-textLight]="!isActive(homeRoute)">
      <i class="bi text-2xl transition-all duration-200"
         [class.bi-house-door-fill]="isActive(homeRoute)"
         [class.bi-house-door]="!isActive(homeRoute)"></i>
      <span class="text-[11px] font-medium">Home</span>
    </a>

    <!-- Orders -->
    <a *ngIf="isLoggedIn && hasStoreContext" [routerLink]="ordersRoute"
       class="flex flex-col items-center gap-0.5 px-5 py-1.5 rounded-2xl transition-all duration-200 min-w-[60px]"
       [class.text-primary]="isActive(ordersRoute)"
       [class.text-textLight]="!isActive(ordersRoute)">
      <i class="bi text-2xl transition-all duration-200"
         [class.bi-receipt-cutoff]="isActive(ordersRoute)"
         [class.bi-receipt]="!isActive(ordersRoute)"></i>
      <span class="text-[11px] font-medium">Orders</span>
    </a>

    <!-- Cart -->
    <a *ngIf="isLoggedIn && hasStoreContext" [routerLink]="cartRoute"
       class="flex flex-col items-center gap-0.5 px-5 py-1.5 rounded-2xl transition-all duration-200 min-w-[60px] relative"
       [class.text-primary]="isActive(cartRoute)"
       [class.text-textLight]="!isActive(cartRoute)">
      <div class="relative">
        <i class="bi text-2xl transition-all duration-200"
           [class.bi-bag-fill]="isActive(cartRoute)"
           [class.bi-bag]="!isActive(cartRoute)"></i>
        <span *ngIf="cartItemCount > 0"
              class="absolute -top-1.5 -right-2 min-w-[18px] h-[18px] bg-primary text-white text-[10px]
                     font-bold rounded-full flex items-center justify-center px-1 leading-none">
          {{ cartItemCount > 99 ? '99+' : cartItemCount }}
        </span>
      </div>
      <span class="text-[11px] font-medium">Cart</span>
    </a>

    <!-- Sign In (when logged out) -->
    <a *ngIf="!isLoggedIn" routerLink="/login"
       class="flex flex-col items-center gap-0.5 px-5 py-1.5 rounded-2xl transition-all duration-200 min-w-[60px]"
       [class.text-primary]="isActive('/login')"
       [class.text-textLight]="!isActive('/login')">
      <i class="bi bi-person text-2xl"></i>
      <span class="text-[11px] font-medium">Sign In</span>
    </a>

  </div>
</footer>
