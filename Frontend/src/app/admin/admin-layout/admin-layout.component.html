<div class="flex min-h-screen bg-surface max-w-7xl mx-auto">

  <!-- Desktop sidebar — sticky so it stays within the max-w container -->
  <aside class="hidden lg:flex flex-col w-64 bg-white border-r border-borderColor
                sticky top-14 self-start h-[calc(100vh-3.5rem)] z-30 overflow-y-auto flex-shrink-0">
    <nav class="p-3 space-y-1 flex-1">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         routerLinkActive="bg-primary-50 text-primary"
         [routerLinkActiveOptions]="{ exact: item.exact }"
         class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm text-textMuted hover:bg-gray-50 hover:text-textDark transition-colors">
        <i [class]="item.icon + ' text-base w-5 text-center'"></i>
        <span class="font-medium">{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <!-- Main content area -->
  <main class="flex-1 pb-24 lg:pb-6 min-w-0">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile bottom nav -->
  <app-admin-footer></app-admin-footer>
</div>
