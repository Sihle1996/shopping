<!-- Global Store Copilot — available on every admin page -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

  <!-- Chat panel -->
  <div *ngIf="open"
       class="w-80 sm:w-96 bg-white rounded-2xl shadow-xl border border-borderColor flex flex-col overflow-hidden"
       style="height: 440px;">
    <div class="flex items-center justify-between px-4 py-3 border-b border-borderColor bg-surface">
      <div class="flex items-center gap-2">
        <span class="text-base">✨</span>
        <div>
          <p class="text-sm font-semibold text-textDark">Store Copilot</p>
          <p class="text-xs text-textMuted">Knows your store · powered by Claude</p>
        </div>
      </div>
      <button (click)="toggle()" class="text-textMuted hover:text-textDark transition-colors">
        <i class="bi bi-x-lg text-sm"></i>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
      <div *ngIf="messages.length === 0" class="flex flex-col gap-2 mt-4">
        <p class="text-xs text-textMuted text-center mb-3">Try asking:</p>
        <button *ngFor="let q of [
          'What should I focus on today?',
          'Which items are slow this month?',
          'Am I low on any stock?',
          'How are my reviews looking?'
        ]" (click)="input = q; send()"
                class="text-left text-xs px-3 py-2 rounded-xl border border-borderColor hover:bg-primary-50
                       hover:border-primary text-textDark transition-colors">
          {{ q }}
        </button>
      </div>

      <div *ngFor="let msg of messages" class="flex flex-col"
           [ngClass]="msg.role === 'user' ? 'items-end' : 'items-start'">
        <div class="max-w-[85%] px-3 py-2 rounded-2xl text-sm whitespace-pre-line"
             [ngClass]="msg.role === 'user'
               ? 'bg-primary text-white rounded-br-sm'
               : 'bg-surface border border-borderColor text-textDark rounded-bl-sm'">
          {{ msg.text }}
        </div>

        <!-- Proposed action confirm cards -->
        <div *ngIf="msg.actions?.length" class="mt-2 w-full space-y-2">
          <div *ngFor="let a of msg.actions"
               class="rounded-xl border border-primary/40 bg-primary-50 px-3 py-2.5">
            <p class="text-xs font-semibold text-textDark mb-2">{{ a.label }}?</p>
            <div class="flex gap-2">
              <button (click)="applyAction(msg, a)" [disabled]="applyingAction"
                      class="px-3 py-1.5 rounded-lg bg-primary text-white text-xs font-semibold
                             hover:bg-primary-600 disabled:opacity-50 transition-colors flex items-center gap-1.5">
                <span *ngIf="applyingAction === a" class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                Apply
              </button>
              <button (click)="dismissAction(msg, a)"
                      class="px-3 py-1.5 rounded-lg border border-borderColor text-xs text-textMuted hover:bg-white transition-colors">
                Dismiss
              </button>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="loading" class="flex justify-start">
        <div class="bg-surface border border-borderColor px-3 py-2 rounded-2xl rounded-bl-sm">
          <span class="inline-flex gap-1">
            <span class="w-1.5 h-1.5 bg-textMuted rounded-full animate-bounce" style="animation-delay:0ms"></span>
            <span class="w-1.5 h-1.5 bg-textMuted rounded-full animate-bounce" style="animation-delay:150ms"></span>
            <span class="w-1.5 h-1.5 bg-textMuted rounded-full animate-bounce" style="animation-delay:300ms"></span>
          </span>
        </div>
      </div>
    </div>

    <div class="px-3 py-3 border-t border-borderColor flex gap-2">
      <input [(ngModel)]="input"
             (keydown)="onKeydown($event)"
             [disabled]="loading"
             placeholder="Ask anything about your store…"
             class="flex-1 min-w-0 px-3 py-2 rounded-xl border border-borderColor text-sm text-textDark
                    bg-surface focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent
                    disabled:opacity-50" />
      <button (click)="send()"
              [disabled]="!input.trim() || loading"
              class="px-3 py-2 rounded-xl bg-primary text-white text-sm disabled:opacity-50
                     hover:bg-primary-600 transition-colors flex-shrink-0">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>

  <!-- Toggle button -->
  <button (click)="toggle()"
          class="w-14 h-14 rounded-full bg-primary text-white shadow-lg hover:bg-primary-600
                 transition-all flex items-center justify-center text-xl">
    <i [ngClass]="open ? 'bi bi-x-lg' : 'bi bi-chat-dots'"></i>
  </button>
</div>
