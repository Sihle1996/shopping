<!-- Smart Alerts bell — floating, stacked above the copilot bubble -->
<div class="fixed bottom-24 right-6 z-40 flex flex-col items-end gap-3">

  <!-- Panel -->
  <div *ngIf="open"
       class="w-80 sm:w-96 bg-white rounded-2xl shadow-xl border border-borderColor flex flex-col overflow-hidden"
       style="max-height: 440px;">
    <div class="flex items-center justify-between px-4 py-3 border-b border-borderColor bg-surface">
      <div class="flex items-center gap-2">
        <i class="bi bi-bell-fill text-primary"></i>
        <div>
          <p class="text-sm font-semibold text-textDark leading-tight">Smart Alerts</p>
          <p class="text-xs text-textMuted">Spotted by your Store Copilot</p>
        </div>
      </div>
      <button (click)="toggle()" class="text-textMuted hover:text-textDark transition-colors">
        <i class="bi bi-x-lg text-sm"></i>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto p-3 space-y-2">
      <!-- Loading -->
      <div *ngIf="loading" class="space-y-2">
        <div *ngFor="let _ of [1,2]" class="h-16 rounded-xl ai-sheen bg-surface"></div>
      </div>

      <!-- Empty -->
      <div *ngIf="!loading && alerts.length === 0" class="flex flex-col items-center text-center py-8 gap-2">
        <i class="bi bi-check2-circle text-3xl text-success"></i>
        <p class="text-sm text-textDark font-medium">All clear</p>
        <p class="text-xs text-textMuted">No issues need your attention right now.</p>
      </div>

      <!-- Alerts -->
      <div *ngFor="let a of alerts"
           class="rounded-xl border p-3"
           [ngClass]="a.severity === 'high' ? 'border-red-200 bg-red-50'
                     : a.severity === 'medium' ? 'border-amber-200 bg-amber-50'
                     : 'border-primary-100 bg-primary-50'">
        <div class="flex items-start gap-2.5">
          <i class="bi mt-0.5 flex-shrink-0" [ngClass]="icon(a.severity) + ' ' + iconColor(a.severity)"></i>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-textDark leading-snug">{{ a.title }}</p>
            <p class="text-xs text-textMuted mt-0.5 leading-snug">{{ a.body }}</p>
            <div class="flex items-center gap-2 mt-2">
              <button *ngIf="a.action" (click)="apply(a)" [disabled]="applyingId"
                      class="px-3 py-1.5 rounded-lg bg-primary text-white text-xs font-semibold
                             hover:bg-primary-600 disabled:opacity-50 transition-colors flex items-center gap-1.5">
                <span *ngIf="applyingId === a.id" class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                <i *ngIf="applyingId !== a.id" class="bi bi-lightning-charge-fill"></i>
                {{ a.action.label }}
              </button>
              <button (click)="dismiss(a)"
                      class="px-3 py-1.5 rounded-lg border border-borderColor text-xs text-textMuted hover:bg-white transition-colors">
                Dismiss
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bell button -->
  <button (click)="toggle()"
          class="relative w-12 h-12 rounded-full bg-white border border-borderColor shadow-lg text-textDark
                 hover:text-primary transition-all flex items-center justify-center"
          [class.ai-glow]="count > 0 && !open"
          [attr.aria-label]="'Smart Alerts'">
    <i class="bi text-lg" [ngClass]="open ? 'bi-x-lg' : 'bi-bell-fill'"></i>
    <span *ngIf="count > 0 && !open"
          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 bg-danger text-white text-[10px] font-bold
                 rounded-full flex items-center justify-center leading-none">
      {{ count }}
    </span>
  </button>
</div>
