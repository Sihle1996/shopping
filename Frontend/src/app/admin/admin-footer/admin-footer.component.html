<footer class="fixed bottom-0 left-0 w-full bg-white border-t border-borderColor z-50 shadow-float">
  <nav class="flex justify-around items-center py-2 max-w-lg mx-auto">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       routerLinkActive="text-primary"
       [routerLinkActiveOptions]="{ exact: item.exact }"
       class="flex flex-col items-center gap-0.5 px-2 py-1 text-textMuted hover:text-primary transition-colors">
      <i [class]="item.icon + ' text-xl'"></i>
      <span class="text-[10px] font-medium">{{ item.label }}</span>
    </a>
  </nav>
</footer>
