<div class="flex h-screen bg-surface overflow-hidden">

  <!-- Sidebar -->
  <aside
    [class.translate-x-0]="sidebarOpen"
    [class.-translate-x-full]="!sidebarOpen"
    class="fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-card flex flex-col transition-transform duration-300
           lg:relative lg:translate-x-0 lg:flex">

    <!-- Brand header -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-borderColor">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center"
           style="background: var(--brand-primary, #4f46e5);">
        <i class="bi bi-shield-lock text-white text-lg"></i>
      </div>
      <div>
        <p class="font-heading text-sm font-bold text-textDark leading-tight">SuperAdmin</p>
        <p class="text-xs text-textMuted">Platform Control</p>
      </div>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="bg-primary-50 text-primary font-semibold"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-textLight hover:bg-surface hover:text-textDark transition-colors cursor-pointer"
        (click)="sidebarOpen = false">
        <i [class]="'bi ' + link.icon + ' text-base'"></i>
        {{ link.label }}
      </a>
    </nav>

    <!-- Logout -->
    <div class="px-4 py-4 border-t border-borderColor">
      <button
        (click)="logout()"
        class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm text-danger hover:bg-red-50 transition-colors">
        <i class="bi bi-box-arrow-left text-base"></i>
        Log out
      </button>
    </div>
  </aside>

  <!-- Mobile sidebar backdrop -->
  <div
    *ngIf="sidebarOpen"
    class="fixed inset-0 z-40 bg-black/40 lg:hidden"
    (click)="sidebarOpen = false">
  </div>

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top header bar -->
    <header class="bg-white border-b border-borderColor px-4 py-3 flex items-center gap-3 lg:px-6">
      <!-- Hamburger (mobile only) -->
      <button
        class="lg:hidden p-1.5 rounded-lg hover:bg-surface transition-colors"
        (click)="sidebarOpen = true">
        <i class="bi bi-list text-xl text-textDark"></i>
      </button>
      <h1 class="font-heading text-lg font-bold text-textDark">SuperAdmin Panel</h1>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto pb-10">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
