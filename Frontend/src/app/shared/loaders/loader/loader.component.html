<div class="ldr" [class.ldr-overlay]="overlay" [ngClass]="'ldr-' + size" [attr.data-state]="state">
  <div class="ldr-inner">
    <div class="ldr-logo">
      <img class="ldr-crave" src="assets/craveit-logo-transparent.png" alt="crave-it" />
      <img class="ldr-it" src="assets/craveit-logo-transparent.png" alt="" aria-hidden="true" />
    </div>
    <div class="ldr-msg" *ngIf="currentMessage">{{ currentMessage }}</div>
  </div>
</div>
