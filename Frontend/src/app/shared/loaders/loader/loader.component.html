<div class="ldr" [class.ldr-overlay]="overlay" [ngClass]="'ldr-' + size" [attr.data-state]="state">
  <div class="ldr-inner">
    <div class="ldr-wordmark"><span class="ldr-crave">crave</span><span class="ldr-it">-it</span></div>
    <div class="ldr-track">
      <span class="ldr-fill"></span>
      <span class="ldr-streak"></span>
    </div>
    <div class="ldr-msg" *ngIf="currentMessage">{{ currentMessage }}</div>
  </div>
</div>
