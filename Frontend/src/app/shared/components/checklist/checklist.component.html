<div>
  <div *ngIf="title" class="flex items-center justify-between mb-3">
    <div>
      <h3 class="font-heading text-sm font-semibold text-textDark">{{ title }}</h3>
      <p *ngIf="subtitle" class="text-xs text-textMuted mt-0.5">{{ subtitle }}</p>
    </div>
    <span *ngIf="items.length" class="text-xs font-semibold text-textMuted">{{ doneCount }}/{{ items.length }}</span>
  </div>

  <div class="space-y-2">
    <div *ngFor="let item of items"
         class="flex items-start gap-3 px-3 py-2.5 rounded-xl border transition-colors"
         [ngClass]="item.done ? 'bg-green-50/60 border-green-100' : 'bg-white border-borderColor'">
      <i class="bi flex-shrink-0 mt-0.5 text-lg"
         [ngClass]="item.done ? 'bi-check-circle-fill text-green-500' : 'bi-circle text-gray-300'"></i>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <p class="text-sm font-medium" [ngClass]="item.done ? 'text-green-700' : 'text-textDark'">{{ item.title }}</p>
          <span *ngIf="item.required" class="text-[10px] font-semibold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-full">Required</span>
          <span *ngIf="item.required === false" class="text-[10px] font-semibold text-textMuted bg-gray-100 px-1.5 py-0.5 rounded-full">Optional</span>
        </div>
        <p *ngIf="item.description && !item.done" class="text-xs text-textMuted mt-0.5 leading-snug">{{ item.description }}</p>
      </div>
      <a *ngIf="!item.done && item.route" [routerLink]="item.route" [queryParams]="item.queryParams"
         class="flex-shrink-0 inline-flex items-center gap-1 text-xs font-semibold text-primary hover:text-primary-700 bg-primary-50 hover:bg-primary-100 px-3 py-1.5 rounded-lg transition-colors">
        {{ item.ctaLabel || 'Set up' }} <i class="bi bi-arrow-right text-[10px]"></i>
      </a>
      <span *ngIf="item.done" class="flex-shrink-0 text-[11px] font-semibold text-green-600 mt-1">Done</span>
    </div>
  </div>
</div>
