<div class="min-h-screen bg-surface">
  <div class="max-w-4xl mx-auto px-4 pt-8 pb-20">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-md">
        <i class="bi bi-fire text-white text-2xl"></i>
      </div>
      <h1 class="font-heading text-3xl font-bold text-textDark">FastFood</h1>
      <p class="text-textLight text-sm mt-2">Choose a restaurant to start ordering</p>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div *ngFor="let _ of [1,2,3,4]" class="bg-white rounded-2xl p-6 shadow-card animate-pulse">
        <div class="h-12 w-12 bg-gray-200 rounded-xl mb-4"></div>
        <div class="h-4 bg-gray-200 rounded w-2/3 mb-2"></div>
        <div class="h-3 bg-gray-200 rounded w-1/2"></div>
      </div>
    </div>

    <!-- Empty -->
    <app-empty-state
      *ngIf="!isLoading && stores.length === 0"
      icon="bi bi-shop"
      title="No restaurants yet"
      message="Be the first to register your restaurant"
      actionLabel="Register Restaurant"
      (action)="goToStore('register-restaurant')">
    </app-empty-state>

    <!-- Store Grid -->
    <div *ngIf="!isLoading && stores.length > 0" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div *ngFor="let store of stores"
           (click)="goToStore(store.slug)"
           class="bg-white rounded-2xl shadow-card p-6 cursor-pointer
                  hover:shadow-card-hover transition-all duration-200 group animate-fade-in">
        <div class="flex items-center gap-4">
          <!-- Logo -->
          <img *ngIf="store.logoUrl" [src]="getLogoUrl(store)"
               class="w-14 h-14 rounded-xl object-cover" />
          <div *ngIf="!store.logoUrl"
               class="w-14 h-14 rounded-xl flex items-center justify-center text-white text-xl font-bold"
               [style.backgroundColor]="store.primaryColor || '#FF6F00'">
            {{ store.name.charAt(0) }}
          </div>
          <!-- Info -->
          <div class="flex-1 min-w-0">
            <h3 class="font-heading font-bold text-textDark group-hover:text-primary transition-colors truncate">
              {{ store.name }}
            </h3>
            <p *ngIf="store.address" class="text-textMuted text-xs mt-0.5 truncate">
              <i class="bi bi-geo-alt mr-1"></i>{{ store.address }}
            </p>
            <p *ngIf="store.phone" class="text-textMuted text-xs mt-0.5">
              <i class="bi bi-telephone mr-1"></i>{{ store.phone }}
            </p>
          </div>
          <!-- Arrow -->
          <i class="bi bi-chevron-right text-textMuted group-hover:text-primary transition-colors"></i>
        </div>
      </div>
    </div>

    <!-- Register CTA -->
    <div class="text-center mt-10">
      <p class="text-textLight text-sm mb-3">Own a restaurant?</p>
      <a routerLink="/register-restaurant"
         class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold
                border-2 border-primary text-primary hover:bg-primary-50 transition-colors">
        <i class="bi bi-shop"></i> Register Your Restaurant
      </a>
    </div>
  </div>
</div>
