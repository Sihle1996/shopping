<div class="min-h-screen bg-surface flex items-center justify-center p-4">
  <div class="w-full max-w-md animate-fade-in">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-md">
        <i class="bi bi-shield-lock text-white text-2xl"></i>
      </div>
      <h1 class="font-heading text-2xl font-bold text-textDark">
        {{ step === 'email' ? 'Forgot Password' : 'Enter Reset Code' }}
      </h1>
      <p class="text-textLight text-sm mt-1">
        {{ step === 'email' ? "We'll send a code to your email" : 'Check your inbox for the 6-digit code' }}
      </p>
    </div>

    <div class="bg-white rounded-2xl shadow-card p-8">

      <!-- Step 1: Email -->
      <form *ngIf="step === 'email'" [formGroup]="emailForm" (ngSubmit)="sendOtp()" class="space-y-5" data-testid="forgot-email-form">
        <div>
          <label class="block text-sm font-medium text-textDark mb-1.5">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <i class="bi bi-envelope text-textMuted"></i>
            </div>
            <input type="email" formControlName="email" data-testid="forgot-email"
                   class="w-full pl-10 pr-4 py-3 rounded-xl border border-borderColor bg-surface text-textDark
                          placeholder-textMuted text-sm focus:outline-none focus:ring-2 focus:ring-primary-400
                          focus:border-transparent transition-shadow"
                   placeholder="your@email.com" />
          </div>
        </div>
        <app-button variant="primary" size="lg" type="submit" [fullWidth]="true"
                    data-testid="forgot-send-code"
                    [loading]="isLoading" [disabled]="emailForm.invalid">
          Send Reset Code
        </app-button>
      </form>

      <!-- Step 2: OTP + new password -->
      <form *ngIf="step === 'otp'" [formGroup]="resetForm" (ngSubmit)="resetPassword()" class="space-y-5" data-testid="forgot-otp-form">
        <div>
          <label class="block text-sm font-medium text-textDark mb-1.5">6-Digit Code</label>
          <input type="text" formControlName="otp" maxlength="6" data-testid="forgot-otp"
                 class="w-full px-4 py-3 rounded-xl border border-borderColor bg-surface text-textDark
                        placeholder-textMuted text-sm text-center tracking-widest font-mono text-lg
                        focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent transition-shadow"
                 placeholder="000000" />
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-1.5">New Password</label>
          <input type="password" formControlName="newPassword" data-testid="forgot-new-password"
                 class="w-full px-4 py-3 rounded-xl border border-borderColor bg-surface text-textDark
                        placeholder-textMuted text-sm focus:outline-none focus:ring-2 focus:ring-primary-400
                        focus:border-transparent transition-shadow"
                 placeholder="Min 6 characters" />
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-1.5">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" data-testid="forgot-confirm-password"
                 class="w-full px-4 py-3 rounded-xl border border-borderColor bg-surface text-textDark
                        placeholder-textMuted text-sm focus:outline-none focus:ring-2 focus:ring-primary-400
                        focus:border-transparent transition-shadow"
                 placeholder="Repeat new password" />
          <p *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched"
             class="text-danger text-xs mt-1">Passwords do not match</p>
        </div>
        <app-button variant="primary" size="lg" type="submit" [fullWidth]="true"
                    data-testid="forgot-reset-submit"
                    [loading]="isLoading" [disabled]="resetForm.invalid">
          Reset Password
        </app-button>
        <button type="button" (click)="step = 'email'" data-testid="forgot-back"
                class="w-full text-sm text-textMuted hover:text-primary transition-colors text-center">
          ← Back
        </button>
      </form>

    </div>

    <p class="text-center text-sm text-textLight mt-6">
      Remembered it?
      <a routerLink="/login" class="text-primary font-semibold hover:underline">Sign in</a>
    </p>
  </div>
</div>
