<!-- Loading -->
<div *ngIf="isLoading" class="min-h-screen bg-surface flex items-center justify-center">
  <div class="animate-pulse text-textMuted">Loading store...</div>
</div>

<!-- Not Found -->
<app-empty-state
  *ngIf="notFound"
  icon="bi bi-shop"
  title="Store not found"
  message="This restaurant doesn't exist or is no longer active"
  actionLabel="Browse Restaurants"
  (action)="router.navigate(['/'])">
</app-empty-state>

<!-- Store closed banner -->
<div *ngIf="!notFound && tenant?.isOpen === false"
     class="bg-amber-50 border-b border-amber-200 px-4 py-3 text-sm text-amber-800">
  <div class="max-w-7xl mx-auto flex items-center gap-2">
    <i class="bi bi-clock text-amber-500"></i>
    <span>This store is currently <strong>closed</strong>. You can still browse the menu.</span>
  </div>
</div>

<!-- Store info strip (ETA + cuisine + hours) -->
<div *ngIf="!notFound && tenant && (tenant.estimatedDeliveryMinutes || tenant.cuisineType || tenant.openingHours)"
     class="brand-surface border-b brand-border-light px-4 py-2.5 text-xs text-textMuted">
  <div class="max-w-7xl mx-auto flex flex-wrap items-center gap-3">
    <span *ngIf="tenant.cuisineType" class="flex items-center gap-1">
      <i class="bi bi-egg-fried text-primary"></i>{{ tenant.cuisineType }}
    </span>
    <span *ngIf="tenant.estimatedDeliveryMinutes" class="flex items-center gap-1">
      <i class="bi bi-clock text-primary"></i>~{{ tenant.estimatedDeliveryMinutes }} min delivery
    </span>
    <span *ngIf="tenant.openingHours" class="flex items-center gap-1">
      <i class="bi bi-calendar3 text-primary"></i>{{ tenant.openingHours }}
    </span>
  </div>
</div>

<!-- Child route outlet — always present so Angular can activate child routes.
     Each child component handles its own loading state. -->
<router-outlet *ngIf="!notFound"></router-outlet>
