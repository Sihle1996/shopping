<div class="min-h-screen bg-surface flex flex-col pb-56 lg:pb-8 max-w-7xl mx-auto">
  <!-- Header -->
  <div class="px-4 pt-6 pb-4 lg:px-8">
    <button (click)="goBack()"
            class="inline-flex items-center gap-1.5 text-xs text-textMuted hover:text-textDark transition-colors mb-3">
      <i class="bi bi-arrow-left text-xs"></i> Back to menu
    </button>
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <h2 class="font-heading text-2xl font-bold text-textDark">Your Cart</h2>
        <span *ngIf="cartItems.length" class="text-textMuted text-sm">({{ cartItems.length }} items)</span>
      </div>
      <div class="flex items-center gap-2">
        <button *ngIf="cartItems.length && isLoggedIn" (click)="shareGroupCart()"
                [disabled]="sharingCart"
                class="flex items-center gap-1.5 text-xs font-semibold text-primary bg-primary-50 px-2 py-1 rounded-lg hover:bg-primary-100 transition-colors disabled:opacity-60">
          <i class="bi bi-people-fill"></i> Group order
        </button>
        <button *ngIf="cartItems.length" (click)="clearAll()"
                class="flex items-center gap-1.5 text-xs text-danger hover:text-red-600 transition-colors px-2 py-1 rounded-lg hover:bg-red-50">
          <i class="bi bi-trash3"></i> Clear all
        </button>
      </div>
    </div>
  </div>

  <!-- Empty Cart -->
  <app-empty-state
    *ngIf="cartItems.length === 0"
    icon="bi bi-cart3"
    title="Your cart is empty"
    message="Browse our menu and add your favourite items to get started"
    actionLabel="Browse Menu"
    (action)="goToMenu()">
  </app-empty-state>

  <!-- Cart Items -->
  <div *ngIf="cartItems.length > 0" class="px-4 lg:px-8 space-y-3">
    <div *ngFor="let item of cartItems; trackBy: trackById"
         class="bg-white p-4 rounded-2xl shadow-card flex items-center gap-4 animate-fade-in">
      <!-- Image -->
      <img [src]="getImageUrl(item.image)" [alt]="item.menuItemName"
           class="w-20 h-20 rounded-xl object-cover flex-shrink-0" />

      <!-- Details -->
      <div class="flex-1 min-w-0">
        <h4 class="font-semibold text-textDark truncate">{{ item.menuItemName }}</h4>
        <p *ngIf="item.itemNotes" class="text-xs text-textMuted mt-0.5 italic truncate">
          <i class="bi bi-pencil-fill text-[10px] mr-1"></i>{{ item.itemNotes }}
        </p>
        <p class="font-numbers font-bold text-primary mt-1">
          R{{ (item.menuItemPrice * item.quantity).toFixed(2) }}
        </p>
      </div>

      <!-- Quantity & Remove -->
      <div class="flex flex-col items-end gap-3">
        <button (click)="removeItem(item.id)"
                class="text-textMuted hover:text-danger transition-colors">
          <i class="bi bi-trash text-base"></i>
        </button>
        <app-quantity-selector
          [quantity]="item.quantity"
          (quantityChange)="onQuantityChange(item, $event)">
        </app-quantity-selector>
      </div>
    </div>
  </div>

  <!-- Sticky Checkout Bar -->
  <div *ngIf="cartItems.length > 0"
       class="bg-white border-t border-borderColor fixed bottom-16 lg:bottom-0 left-0 w-full z-40 shadow-float">
    <div class="max-w-7xl mx-auto px-4 lg:px-8 py-4">
      <div class="lg:flex lg:items-end lg:justify-between lg:gap-10">

        <!-- Price summary -->
        <div class="flex-1">
          <div class="flex justify-between items-center" [class.mb-1]="discount > 0" [class.mb-2]="!discount">
            <span class="text-textLight text-sm">Subtotal</span>
            <span class="font-numbers text-sm text-textLight" [class.line-through]="discount > 0">R{{ subtotal.toFixed(2) }}</span>
          </div>
          <div *ngIf="discount > 0" class="flex justify-between items-center mb-2">
            <span class="text-sm flex items-center gap-1" style="color: var(--brand-primary)">
              <i class="bi bi-tag-fill text-xs"></i>{{ autoDiscountPercent }}% off
            </span>
            <span class="font-numbers text-sm font-semibold" style="color: var(--brand-primary)">-R{{ discount.toFixed(2) }}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-textDark font-semibold text-sm">Total</span>
            <span class="font-numbers font-bold text-2xl text-primary">R{{ totalPrice.toFixed(2) }}</span>
          </div>
        </div>

        <!-- Checkout button — full width on mobile, fixed width on desktop -->
        <div class="mt-3 lg:mt-0 lg:w-56 flex-shrink-0">
          <app-button
            variant="primary"
            size="lg"
            [fullWidth]="true"
            [disabled]="!cartItems.length"
            iconRight="bi bi-arrow-right"
            (clicked)="proceedToCheckout()">
            Proceed to Checkout
          </app-button>
        </div>

      </div>
    </div>
  </div>
</div>
