<div class="p-4 pb-24 max-w-lg mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-xl font-bold text-textDark">Saved Addresses</h2>
      <p class="text-sm text-textMuted mt-0.5">Manage your delivery addresses</p>
    </div>
    <button (click)="openAdd()"
            class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-primary-500 text-white text-sm font-semibold hover:bg-primary-600 transition-colors">
      <i class="bi bi-plus-lg"></i> Add
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="space-y-3">
    <div *ngFor="let i of [1,2,3]" class="h-20 bg-gray-100 rounded-2xl animate-pulse"></div>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && addresses.length === 0" class="text-center py-16 text-textMuted">
    <i class="bi bi-geo-alt text-4xl block mb-2"></i>
    <p class="text-sm">No saved addresses yet</p>
  </div>

  <!-- Address list -->
  <div *ngIf="!loading && addresses.length > 0" class="space-y-3">
    <div *ngFor="let a of addresses"
         class="bg-white rounded-2xl border p-4 shadow-card flex items-start justify-between gap-3"
         [ngClass]="a.isDefault ? 'border-primary-400' : 'border-borderColor'">
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-0.5">
          <span class="text-sm font-semibold text-textDark">{{ a.label }}</span>
          <span *ngIf="a.isDefault" class="text-xs bg-primary-100 text-primary-700 px-1.5 py-0.5 rounded-full font-medium">Default</span>
        </div>
        <p class="text-xs text-textMuted">{{ a.street }}, {{ a.city }} {{ a.postalCode }}</p>
      </div>
      <div class="flex items-center gap-1 flex-shrink-0">
        <button (click)="openEdit(a)" class="p-1.5 rounded-lg text-textMuted hover:bg-gray-100 transition-colors">
          <i class="bi bi-pencil text-sm"></i>
        </button>
        <button (click)="confirmDelete(a.id)" class="p-1.5 rounded-lg text-textMuted hover:text-red-500 hover:bg-red-50 transition-colors">
          <i class="bi bi-trash text-sm"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Form Sheet -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
      <div class="flex items-center justify-between mb-4">
        <p class="font-semibold text-textDark">{{ editingId ? 'Edit Address' : 'New Address' }}</p>
        <button (click)="showForm = false" class="p-1 text-textMuted hover:text-textDark">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="space-y-3">
        <div>
          <label class="text-xs font-medium text-textMuted block mb-1">Label</label>
          <select formControlName="label"
                  class="w-full px-3 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400">
            <option>Home</option>
            <option>Work</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-textMuted block mb-1">Street</label>
          <input formControlName="street" type="text" placeholder="123 Main St"
                 class="w-full px-3 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-xs font-medium text-textMuted block mb-1">City</label>
            <input formControlName="city" type="text" placeholder="Cape Town"
                   class="w-full px-3 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
          </div>
          <div>
            <label class="text-xs font-medium text-textMuted block mb-1">Postal Code</label>
            <input formControlName="postalCode" type="text" placeholder="8001"
                   class="w-full px-3 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
          </div>
        </div>
        <label class="flex items-center gap-2 text-sm text-textDark cursor-pointer">
          <input formControlName="isDefault" type="checkbox" class="w-4 h-4 rounded accent-primary-500" />
          Set as default address
        </label>
        <button type="submit" [disabled]="saving || form.invalid"
                class="w-full py-2.5 rounded-xl bg-primary-500 hover:bg-primary-600 text-white text-sm font-semibold transition-colors disabled:opacity-50">
          {{ saving ? 'Saving...' : 'Save Address' }}
        </button>
      </form>
    </div>
  </div>

  <!-- Delete confirm -->
  <div *ngIf="confirmDeleteId" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl">
      <p class="font-semibold text-textDark mb-1">Delete address?</p>
      <p class="text-sm text-textMuted mb-4">This cannot be undone.</p>
      <div class="flex gap-3">
        <button (click)="cancelDelete()" class="flex-1 py-2.5 rounded-xl border border-borderColor text-sm text-textDark hover:bg-gray-50">Cancel</button>
        <button (click)="deleteAddress()" class="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white text-sm font-semibold">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div *ngIf="toast" class="fixed bottom-20 left-4 right-4 z-50 flex justify-center pointer-events-none">
    <div class="px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg text-white animate-fade-in"
         [ngClass]="toastType === 'success' ? 'bg-gray-900' : 'bg-red-500'">{{ toast }}</div>
  </div>
</div>
