<div class="min-h-screen bg-surface flex items-center justify-center p-4">
  <div class="w-full max-w-md animate-fade-in text-center">

    <!-- Loading -->
    <div *ngIf="status === 'loading'">
      <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md">
        <i class="bi bi-envelope-check text-white text-2xl"></i>
      </div>
      <h1 class="font-heading text-2xl font-bold text-textDark mb-2">Verifying your email…</h1>
      <p class="text-textLight text-sm">Please wait a moment.</p>
    </div>

    <!-- Success -->
    <div *ngIf="status === 'success'">
      <div class="w-16 h-16 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md">
        <i class="bi bi-check-lg text-white text-2xl"></i>
      </div>
      <h1 class="font-heading text-2xl font-bold text-textDark mb-2">Email verified!</h1>
      <p class="text-textLight text-sm">You're being logged in now…</p>
    </div>

    <!-- Error -->
    <div *ngIf="status === 'error'">
      <div class="w-16 h-16 bg-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md">
        <i class="bi bi-x-lg text-white text-2xl"></i>
      </div>
      <h1 class="font-heading text-2xl font-bold text-textDark mb-2">Verification failed</h1>
      <p class="text-textLight text-sm mb-6">{{ errorMessage }}</p>
      <a routerLink="/login" class="text-primary font-semibold hover:underline text-sm">
        Go to login to resend verification email
      </a>
    </div>

  </div>
</div>
