<div class="min-h-screen bg-surface flex flex-col pb-20">

  <!-- Hero Section -->
  <div class="px-4 pt-6 pb-2 lg:px-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <p class="text-textLight text-sm">Discover</p>
        <h2 class="font-heading text-2xl md:text-3xl font-bold text-textDark">
          Delicious Food 🍔
        </h2>
      </div>
    </div>

    <!-- Featured Promotion Banner -->
    <div class="mb-6" *ngIf="featuredPromotion as fp">
      <app-promotion-banner [promotion]="fp"></app-promotion-banner>
    </div>

    <!-- Search Bar -->
    <div class="mb-6">
      <app-search-bar
        placeholder="Search for burgers, pizza, drinks..."
        [value]="searchQuery"
        (search)="onSearch($event)">
      </app-search-bar>
    </div>

    <!-- Category Chips -->
    <div class="mb-6">
      <app-category-chips
        [categories]="categories"
        [selected]="selectedCategory"
        (selectedChange)="filterByCategory($event)">
      </app-category-chips>
    </div>

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-heading text-lg font-semibold text-textDark">
        {{ selectedCategory === 'All' ? 'Popular' : selectedCategory }}
        <span class="text-textMuted font-normal text-sm ml-1">({{ filteredMenuItems.length }})</span>
      </h3>
      <select
        [(ngModel)]="selectedSort"
        (change)="sortMenu()"
        class="text-sm border border-borderColor rounded-lg px-3 py-2 bg-white text-textDark
               focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent cursor-pointer">
        <option value="default">Sort by</option>
        <option value="priceLowHigh">Price: Low → High</option>
        <option value="priceHighLow">Price: High → Low</option>
      </select>
    </div>
  </div>

  <!-- Promotions Grid -->
  <div class="px-4 lg:px-8 mb-6" *ngIf="promotions?.length && selectedCategory === 'All' && !searchQuery">
    <h3 class="font-heading text-lg font-semibold text-textDark mb-3">
      <i class="bi bi-tag text-primary mr-1"></i> Promotions
    </h3>
    <app-promotion-grid [promotions]="promotions"></app-promotion-grid>
  </div>

  <!-- Product Grid -->
  <div class="flex-1 px-4 lg:px-8">
    <!-- Empty state -->
    <app-empty-state
      *ngIf="filteredMenuItems.length === 0 && !isLoading"
      icon="bi bi-search"
      title="No items found"
      message="Try adjusting your search or category filter"
      actionLabel="Clear Filters"
      (action)="clearFilters()">
    </app-empty-state>

    <!-- Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
      <app-product-card
        *ngFor="let item of filteredMenuItems; trackBy: trackById"
        [item]="item"
        [showFavorite]="isLoggedIn"
        [showAddToCart]="isLoggedIn"
        [discountPercent]="getDiscountForItem(item)"
        (cardClick)="goToProductDetails($event)"
        (addToCart)="quickAddToCart($event)"
        (favorite)="toggleFavorite($event)">
      </app-product-card>
    </div>
  </div>

  <!-- Floating Cart Bar (mobile) -->
  <app-floating-cart-bar
    [itemCount]="cartItemCount"
    [totalPrice]="cartTotal"
    (openCart)="openCartDrawer()">
  </app-floating-cart-bar>

  <!-- Cart Drawer -->
  <app-cart-drawer
    [isOpen]="isCartOpen"
    [items]="cartItems"
    [totalPrice]="cartTotal"
    (close)="closeCartDrawer()"
    (checkout)="goToCheckout()"
    (browseMenu)="closeCartDrawer()"
    (removeItem)="removeCartItem($event)"
    (updateQuantity)="updateCartItemQuantity($event)">
  </app-cart-drawer>
</div>
