<div class="min-h-screen bg-surface pb-20">
  <!-- Loading state -->
  <div *ngIf="!product" class="flex items-center justify-center min-h-screen">
    <div class="animate-pulse text-textMuted">Loading...</div>
  </div>

  <div *ngIf="product" class="animate-fade-in">
    <!-- Image Section -->
    <div class="relative">
      <div class="aspect-[4/3] sm:aspect-[16/9] lg:aspect-[21/9] overflow-hidden bg-gray-100">
        <img [src]="getImageUrl(product.image)"
             [alt]="product.name"
             class="w-full h-full object-cover" />
      </div>

      <!-- Back button -->
      <button (click)="goBack()"
              class="absolute top-4 left-4 w-10 h-10 rounded-full bg-white/90 backdrop-blur-sm shadow-sm
                     flex items-center justify-center hover:bg-white transition-colors">
        <i class="bi bi-arrow-left text-textDark text-lg"></i>
      </button>

      <!-- Favorite button -->
      <button class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/90 backdrop-blur-sm shadow-sm
                     flex items-center justify-center hover:bg-red-50 hover:text-danger transition-all">
        <i class="bi bi-heart text-lg"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="max-w-lg mx-auto px-4 -mt-6 relative z-10">
      <div class="bg-white rounded-2xl shadow-card p-6 space-y-6">

        <!-- Name & Category -->
        <div>
          <app-badge variant="primary" size="sm">{{ product.category }}</app-badge>
          <h1 class="font-heading text-2xl font-bold text-textDark mt-2">{{ product.name }}</h1>
          <p class="text-textLight text-sm mt-2 leading-relaxed">{{ product.description }}</p>
        </div>

        <!-- Size Selector -->
        <div>
          <p class="text-sm font-medium text-textDark mb-3">Select Size</p>
          <div class="flex gap-3">
            <button *ngFor="let size of ['S', 'M', 'L']"
                    (click)="selectSize(size)"
                    [class]="getSizeClasses(size)">
              {{ size }}
            </button>
          </div>
        </div>

        <!-- Quantity -->
        <div class="flex items-center justify-between">
          <p class="text-sm font-medium text-textDark">Quantity</p>
          <app-quantity-selector
            [quantity]="quantity"
            (quantityChange)="quantity = $event">
          </app-quantity-selector>
        </div>

        <!-- Divider -->
        <div class="border-t border-borderColor"></div>

        <!-- Price & Add to Cart -->
        <div class="flex items-center justify-between">
          <div>
            <p class="text-textMuted text-xs">Total Price</p>
            <p *ngIf="autoDiscountPercent" class="font-numbers text-sm text-textLight line-through leading-none">
              R{{ (product.price * quantity).toFixed(2) }}
            </p>
            <p class="font-numbers text-2xl font-bold text-primary leading-tight">
              R{{ discountedPrice.toFixed(2) }}
            </p>
            <p *ngIf="autoDiscountPercent" class="text-xs font-medium mt-0.5" style="color: var(--brand-primary)">
              {{ autoDiscountPercent }}% off applied
            </p>
          </div>
          <app-button
            variant="primary"
            size="lg"
            iconLeft="bi bi-cart-plus"
            [loading]="isAddingToCart"
            (clicked)="addToCart()">
            Add to Cart
          </app-button>
        </div>
      </div>
    </div>
  </div>
</div>
