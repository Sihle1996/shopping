<div class="min-h-screen bg-surface pb-24 lg:pb-8">

  <!-- Header -->
  <div class="bg-white border-b border-borderColor px-4 lg:px-8 py-4 sticky top-14 z-10">
    <div class="max-w-3xl mx-auto">
      <h2 class="font-heading text-lg font-bold text-textDark">My Profile</h2>
      <p class="text-xs text-textMuted">Manage your account details</p>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-4 lg:px-8 pt-6 space-y-4">

    <!-- Loading -->
    <div *ngIf="loading" class="space-y-3">
      <div *ngFor="let i of [1,2,3]" class="h-14 bg-white rounded-xl animate-pulse shadow-card"></div>
    </div>

    <ng-container *ngIf="!loading">

      <!-- Account info (read-only) -->
      <div class="bg-white rounded-2xl border border-borderColor p-5 shadow-card">
        <p class="text-xs font-semibold text-textMuted uppercase tracking-wide mb-3">Account</p>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
            <i class="bi bi-person text-primary text-lg"></i>
          </div>
          <div>
            <p class="text-sm font-semibold text-textDark">{{ email }}</p>
            <p class="text-xs text-textMuted capitalize">{{ role?.replace('ROLE_','') | lowercase }}</p>
          </div>
        </div>
      </div>

      <!-- Personal info form -->
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="bg-white rounded-2xl border border-borderColor p-5 shadow-card space-y-4">
          <p class="text-xs font-semibold text-textMuted uppercase tracking-wide">Personal Info</p>
          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-medium text-textMuted block mb-1">Full Name</label>
              <input formControlName="fullName" type="text" placeholder="Your name"
                     class="w-full px-4 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
            <div>
              <label class="text-xs font-medium text-textMuted block mb-1">Phone</label>
              <input formControlName="phone" type="tel" placeholder="+27..."
                     class="w-full px-4 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
          </div>
          <div class="flex gap-3 pt-1">
            <button type="submit" [disabled]="saving"
                    class="flex-1 py-2.5 rounded-xl bg-primary hover:bg-primary-600 text-white text-sm font-semibold transition-colors disabled:opacity-50">
              {{ saving ? 'Saving...' : 'Save Changes' }}
            </button>
            <a routerLink="/profile/addresses"
               class="flex items-center gap-1.5 px-4 py-2.5 rounded-xl border border-borderColor text-sm text-textDark hover:bg-gray-50 transition-colors">
              <i class="bi bi-geo-alt"></i> Addresses
            </a>
          </div>
        </div>
      </form>

      <!-- Change password -->
      <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
        <div class="bg-white rounded-2xl border border-borderColor p-5 shadow-card space-y-4">
          <p class="text-xs font-semibold text-textMuted uppercase tracking-wide">Change Password</p>
          <div>
            <label class="text-xs font-medium text-textMuted block mb-1">Current Password</label>
            <input formControlName="currentPassword" type="password" placeholder="••••••••"
                   class="w-full px-4 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
          </div>
          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-medium text-textMuted block mb-1">New Password</label>
              <input formControlName="newPassword" type="password" placeholder="••••••••"
                     class="w-full px-4 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
            <div>
              <label class="text-xs font-medium text-textMuted block mb-1">Confirm New Password</label>
              <input formControlName="confirmPassword" type="password" placeholder="••••••••"
                     class="w-full px-4 py-2.5 rounded-xl border border-borderColor bg-surface text-sm text-textDark focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
          </div>
          <button type="submit" [disabled]="changingPassword"
                  class="w-full py-2.5 rounded-xl border border-borderColor text-sm font-semibold text-textDark hover:bg-gray-50 transition-colors disabled:opacity-50">
            {{ changingPassword ? 'Changing...' : 'Change Password' }}
          </button>
        </div>
      </form>

    </ng-container>
  </div>
</div>
