spring.application.name=backend

# Resend email
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:noreply@crave-it.co.za}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Admin123}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation= true
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.PostgreSQLDialect
#Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto= update

# Flyway disabled - Hibernate manages schema locally
spring.flyway.enabled=false

spring.web.resources.static-locations=file:uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=28800000
application.security.jwt.refresh-token.expiration=604800000

payfast.merchant-id=${PAYFAST_MERCHANT_ID:10047538}
payfast.merchant-key=${PAYFAST_MERCHANT_KEY:spyb8p7msa9ob}
payfast.passphrase=${PAYFAST_PASSPHRASE:}
payfast.sandbox=${PAYFAST_SANDBOX:true}

app.frontend-url=${FRONTEND_URL:http://localhost:4200}
app.backend-url=${BACKEND_URL:http://localhost:8080}

# CORS - frontend origin
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# Cloudinary — set CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET in env
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:local}
cloudinary.api-key=${CLOUDINARY_API_KEY:local}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:local}

# Anthropic AI — used by AdminAiService. Empty key => AI features fall back to
# rule-based responses. Set ANTHROPIC_API_KEY in env to enable real calls.
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5-20251001
# Stronger model for the agentic Store Copilot (tool use + reasoning)
anthropic.agent-model=${ANTHROPIC_AGENT_MODEL:claude-sonnet-4-6}
anthropic.max-tokens=1024

# VAPID keys for Web Push — generate with: npx web-push generate-vapid-keys
# Leave blank to disable push notifications
vapid.public-key=${VAPID_PUBLIC_KEY:}
vapid.private-key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:noreply@crave-it.co.za}

# OpenRouteService API key (driver route directions). Dev default kept so local dev works;
# set ORS_API_KEY in env to override/rotate without a code change.
ors.api-key=${ORS_API_KEY:5b3ce3597851110001cf62486eb46190526c4d34b70f6499f1ba52c2}

# Delivery fee — server-authoritative distance fee (DeliveryFeeService): base (per-store) +
# max(0, distanceKm - includedKm) * perKmRate, capped. Per-km / included / cap are PLATFORM-wide
# (the delivery fee is platform revenue funding the drivers). Defaults keep the current R2.50/km price.
delivery.per-km-rate=${DELIVERY_PER_KM_RATE:2.50}
delivery.included-km=${DELIVERY_INCLUDED_KM:0}
delivery.max-fee-cap=${DELIVERY_MAX_FEE_CAP:200}

