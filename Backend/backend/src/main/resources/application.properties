spring.application.name=backend

# Resend email
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:noreply@crave-it.co.za}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Admin123}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation= true
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.PostgreSQLDialect
#Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto= update

# Flyway disabled - Hibernate manages schema locally
spring.flyway.enabled=false

spring.web.resources.static-locations=file:uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=28800000
application.security.jwt.refresh-token.expiration=604800000

payfast.merchant-id=${PAYFAST_MERCHANT_ID:10047538}
payfast.merchant-key=${PAYFAST_MERCHANT_KEY:spyb8p7msa9ob}
payfast.passphrase=${PAYFAST_PASSPHRASE:}
payfast.sandbox=${PAYFAST_SANDBOX:true}

app.frontend-url=${FRONTEND_URL:http://localhost:4200}
app.backend-url=${BACKEND_URL:http://localhost:8080}

# CORS - frontend origin
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# Cloudinary — set CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET in env
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:local}
cloudinary.api-key=${CLOUDINARY_API_KEY:local}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:local}

# VAPID keys for Web Push — generate with: npx web-push generate-vapid-keys
# Leave blank to disable push notifications
vapid.public-key=${VAPID_PUBLIC_KEY:}
vapid.private-key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:noreply@crave-it.co.za}

