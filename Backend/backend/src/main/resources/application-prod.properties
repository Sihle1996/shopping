# Production overrides — all values come from Railway environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Use update carefully in prod — switch to validate after first deploy
spring.jpa.hibernate.ddl-auto=update

# Larger pool for production traffic
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Store uploads on Railway volume or external storage
spring.web.resources.static-locations=file:uploads/

application.security.jwt.secret-key=${JWT_SECRET}
paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=${PAYPAL_MODE:live}

app.cors.allowed-origins=${ALLOWED_ORIGINS}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Resend email
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}
