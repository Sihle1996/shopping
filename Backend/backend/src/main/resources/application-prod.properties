# Production overrides — all values come from Railway environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate creates/updates schema; Flyway handles data migrations and manual DDL
spring.jpa.hibernate.ddl-auto=update

# Enable Flyway in production; baseline at V6 so V7+ are the only new migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=6
# Auto-repair failed migration entries left by previous deployment crashes (PostgreSQL 18 + Flyway 10 edge case)
spring.flyway.repair-on-migrate=true

# Larger pool for production traffic
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Store uploads on Railway volume or external storage
spring.web.resources.static-locations=file:uploads/

application.security.jwt.secret-key=${JWT_SECRET}
payfast.merchant-id=${PAYFAST_MERCHANT_ID}
payfast.merchant-key=${PAYFAST_MERCHANT_KEY}
payfast.passphrase=${PAYFAST_PASSPHRASE:}
payfast.sandbox=${PAYFAST_SANDBOX:false}

app.frontend-url=${FRONTEND_URL}
app.backend-url=${BACKEND_URL}

app.cors.allowed-origins=${ALLOWED_ORIGINS}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Resend email
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}
