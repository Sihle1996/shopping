name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend Build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Angular Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build:prod
        env:
          NODE_OPTIONS: --max_old_space_size=4096

  # ── Backend Build ───────────────────────────────────────────────────────────
  backend:
    name: Backend — Spring Boot Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (skip tests)
        run: ./mvnw clean package -DskipTests

  # ── Playwright E2E ──────────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 15
    # Only run when a public target URL is configured (set E2E_BASE_URL in repo variables)
    if: ${{ vars.E2E_BASE_URL != '' }}

    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wake up backend
        run: |
          echo "Pinging backend to wake Railway instance..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ vars.E2E_BASE_URL }}/api/tenants/active" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is up"
              break
            fi
            sleep 15
          done

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ vars.E2E_BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
